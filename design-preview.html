<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Превью дизайна: Карточка проекта</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-8">

    <!-- RadarCard Component Preview -->
    <div class="group relative w-full max-w-sm cursor-pointer">
        <!-- Background Accent on Hover -->
        <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl blur opacity-60 group-hover:opacity-100 transition duration-1000 group-hover:duration-200 animate-tilt"></div>
        
        <!-- Main Card -->
        <div class="relative p-6 bg-white rounded-2xl shadow-lg h-full flex flex-col justify-between">
            <div>
                <!-- Header -->
                <div class="flex items-start justify-between mb-4">
                    <h3 class="text-xl font-bold text-slate-800">Разработка Focus Flow OS</h3>
                    <!-- Status Badge -->
                    <div class="px-2 py-1 text-xs font-semibold text-amber-800 bg-amber-100 rounded-full">
                        Простаивает
                    </div>
                </div>

                <!-- Radar Section -->
                <div class="flex items-center justify-center my-6">
                    <div class="relative w-32 h-32">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <!-- Background track -->
                            <circle cx="50" cy="50" r="42" stroke="#E2E8F0" stroke-width="8" fill="none" />
                            <!-- Progress arc -->
                            <circle cx="50" cy="50" r="42" stroke="url(#progressGradient)" stroke-width="8" fill="none"
                                stroke-linecap="round"
                                class="transform -rotate-90 origin-center"
                                stroke-dasharray="264"
                                stroke-dashoffset="66" <!-- 264 * (1 - 0.75) -->
                            />
                            <defs>
                                <linearGradient id="progressGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#4F46E5" />
                                    <stop offset="100%" stop-color="#A78BFA" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-4xl font-extrabold text-slate-800">88</span>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between text-slate-500">
                        <span>Прогресс</span>
                        <span class="font-semibold text-slate-700">75%</span>
                    </div>
                    <div class="flex justify-between text-slate-500">
                        <span>Вес</span>
                        <span class="font-semibold text-slate-700">Высокий</span>
                    </div>
                    <div class="flex justify-between text-slate-500">
                        <span>Трение</span>
                        <span class="font-semibold text-slate-700">Низкое</span>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="mt-8 flex items-center justify-end text-sm font-semibold text-indigo-600">
                <span class="mr-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    Войти в фокус
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transform transition-transform group-hover:translate-x-1">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </div>
        </div>
    </div>
    <!-- End of RadarCard -->

</body>
</html>
